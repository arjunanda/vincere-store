services:
  # ──────────────────────────────────────────────────────────
  # App: Laravel Octane (FrankenPHP) + Reverb + Queue + Scheduler
  # ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: vincere-store:latest
    container_name: vincere_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8002}:8000"
      - "${REVERB_PORT:-8081}:8080"

    environment:
      APP_NAME: "${APP_NAME:-Vincere Store}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-https://vincerestore.com}"

      # Database (HOST MACHINE POSTGRESQL)
      DB_CONNECTION: pgsql
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_DATABASE: vincere_store
      DB_USERNAME: junastack
      DB_PASSWORD: "Junedi12345**##"

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"

      # Queue
      QUEUE_CONNECTION: redis

      # Cache
      CACHE_STORE: redis

      # Session
      SESSION_DRIVER: redis

      # Octane
      OCTANE_SERVER: frankenphp

      # Reverb
      REVERB_APP_ID: "${REVERB_APP_ID}"
      REVERB_APP_KEY: "${REVERB_APP_KEY}"
      REVERB_APP_SECRET: "${REVERB_APP_SECRET}"
      REVERB_HOST: "217.15.167.231"
      REVERB_PORT: 8081
      REVERB_SCHEME: http

      # Broadcast
      BROADCAST_CONNECTION: reverb

      # Vite (Frontend Environment Variables)
      VITE_REVERB_APP_KEY: "${REVERB_APP_KEY}"
      VITE_REVERB_HOST: "217.15.167.231"
      VITE_REVERB_PORT: 8081
      VITE_REVERB_SCHEME: http

      # WhatsApp Service
      WA_SERVICE_URL: "${WA_SERVICE_URL:-}"

    volumes:
      - storage_data:/var/www/html/storage/app/public

    depends_on:
      redis:
        condition: service_healthy

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - vincere_network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vincere_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - vincere_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ──────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────
volumes:
  storage_data:
    driver: local
  redis_data:
    driver: local

# ──────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────
networks:
  vincere_network:
    driver: bridge